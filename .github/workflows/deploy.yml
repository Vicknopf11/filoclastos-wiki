name: Build, Encrypt & Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build site with Jekyll
        run: bundle exec jekyll build --destination _site

      - name: Debug - list _site contents
        run: |
          echo "--- struttura completa di _site ---"
          find _site -maxdepth 4
          echo "--- cerco specificamente idee ---"
          find _site -iname "*idee*"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install staticrypt
        run: npm install -g staticrypt

      - name: Encrypt idee/ section
        run: |
          FILES=$(find _site -type d -iname "idee" -exec find {} -name "*.html" \;)
          echo "File trovati da cifrare:"
          echo "$FILES"
          if [ -z "$FILES" ]; then
            echo "ATTENZIONE: nessun file trovato in una cartella idee/ dentro _site"
            exit 0
          fi
          echo "$FILES" | while IFS= read -r file; do
            echo "Cifro: $file"
            staticrypt "$file" -p "${{ secrets.IDEE_PASSWORD }}" \
              --short -o "$file" \
              --template-title "Filoclastos — Accesso protetto" \
              --template-instructions "Questa sezione è protetta. Inserisci la password."
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
