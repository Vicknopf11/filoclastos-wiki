name: Build, Encrypt & Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build site with Jekyll
        run: bundle exec jekyll build --destination _site

      - name: Debug - list _site contents
        run: |
          echo "--- struttura completa di _site ---"
          find _site -maxdepth 4
          echo "--- cerco specificamente idee ---"
          find _site -iname "*idee*"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install staticrypt
        run: npm install -g staticrypt

      - name: Debug password length (safe)
        run: |
          echo "Lunghezza password: ${#IDEE_PASSWORD} caratteri"
        env:
          IDEE_PASSWORD: ${{ secrets.IDEE_PASSWORD }}  

      - name: Encrypt idee/ section
        run: |
          if [ ! -d "_site/idee" ]; then
            echo "ATTENZIONE: _site/idee non esiste, nulla da cifrare"
            exit 0
          fi
          staticrypt _site/idee -r -p "${{ secrets.IDEE_PASSWORD }}" \
            -d _site --short \
            --template-title "Filoclastos — Accesso protetto" \
            --template-instructions "Questa sezione è protetta. Inserisci la password."
          echo "Cifratura completata:"
          find _site/idee -name "*.html"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
